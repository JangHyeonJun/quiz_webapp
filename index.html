<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>60초 공부퀴즈</title>
  <meta name="theme-color" content="#111111"/>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background:#f6f7f9; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 16px; }
    .card { background:#fff; border-radius: 14px; padding: 16px; box-shadow: 0 6px 20px rgba(0,0,0,.06); margin-bottom: 12px; }
    .timer-wrap { position: relative; }
    .timer { font-size: 42px; font-weight: 800; text-align:center; margin: 6px 0 12px; }
    .timer-reset { position: absolute; top: 0; right: 0; width: auto; padding: 6px 12px; font-size: 12px; font-weight: 700; color: #667; border-radius: 10px; background: #f0f1f3; border: none; cursor: pointer; }
    .timer-reset:hover { background: #e0e2e6; }
    .answer-wrap { position: relative; padding-top: 0; }
    .answer-header { display: flex; justify-content: space-between; align-items: center; }
    .answer-toggle { width: auto; padding: 4px 12px; font-size: 12px; font-weight: 700; color: #667; border-radius: 10px; background: #f0f1f3; border: none; cursor: pointer; margin: 0; flex-shrink: 0; }
    .answer-toggle:hover { background: #e0e2e6; }
    .bar { height: 10px; background:#e9edf2; border-radius: 999px; overflow:hidden; }
    .bar > div { height: 100%; width: 100%; background:#111; transition: width .15s linear; }
    h1 { font-size: 18px; margin: 0 0 12px; }
    .label { font-weight:700; margin: 4px 0 6px; }
    .q { font-size: 20px; line-height: 1.45; white-space: pre-wrap; }
    .a { font-size: 18px; line-height: 1.45; white-space: pre-wrap; }
    .muted { color:#667; font-size: 13px; }
    button { width:100%; padding: 14px 14px; border-radius: 12px; border:0; font-size: 16px; font-weight: 800; }
    .primary { background:#111; color:#fff; }
    .ghost { background:#fff; color:#111; border:1px solid #d8dde6; margin-top: 10px; }
    .danger { background:#fff; color:#111; border:1px solid #111; margin-top: 0; }
    .danger.active { background:#111; color:#fff; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .sub-row { display: flex; gap: 8px; margin-top: 8px; }
    .sub-row button { width: 50%; padding: 10px; font-size: 13px; font-weight: 700; margin-top: 0; }
    .wrong-list { max-height: 400px; overflow-y: auto; }
    .wrong-item { padding: 12px; border-bottom: 1px solid #e9edf2; cursor: pointer; }
    .wrong-item:hover { background: #f0f1f3; }
    .wrong-item .wrong-q { font-weight: 700; margin-bottom: 4px; font-size: 14px; }
    .wrong-item .wrong-a { font-size: 13px; color: #667; white-space: pre-wrap; display: none; }
    .wrong-item.open .wrong-a { display: block; margin-top: 6px; }
    .badge { display: inline-block; background: #e53e3e; color: #fff; font-size: 11px; font-weight: 800; border-radius: 999px; padding: 1px 7px; margin-left: 4px; }
    .row { display:flex; gap:10px; }
    .row button { width: 50%; }
    @media (max-width: 480px) { .row { flex-direction: column; } .row button { width:100%; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>공부 퀴즈 (60초 / 1문제)</h1>
      <div class="timer-wrap">
        <div class="timer" id="timer">60</div>
        <button class="timer-reset" id="restartBtn" title="타이머 리셋">리셋</button>
      </div>
      <div class="bar"><div id="bar"></div></div>
      <div class="muted" id="cycleInfo" style="margin-top:10px;"></div>
    </div>

    <div class="card">
      <div class="label">문제</div>
      <div class="q" id="question">로딩중…</div>

      <div class="answer-wrap" style="margin-top:14px;">
        <div class="answer-header">
          <div class="label" style="margin:0;">정답</div>
          <button class="answer-toggle" id="showAnswerBtn" title="정답보기"><span id="answerToggleLabel">보기</span></button>
        </div>
        <div id="answerBox" style="display:none; margin-top:8px;">
          <div class="a" id="answer"></div>
        </div>
      </div>
    </div>

    <div class="row">
      <button class="ghost" id="prevBtn" disabled>이전 문제</button>
      <button class="primary" id="nextBtn">다음 문제</button>
    </div>
    <div class="row">
      <button class="danger" id="markWrongBtn" style="padding:9px 14px;">모르는 문제</button>
      <button class="ghost" id="showWrongListBtn" style="padding:9px 14px;">목록 (0)</button>
    </div>

    <div class="card" id="wrongListPanel" style="display:none; margin-top:8px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <div class="label" style="margin:0; font-size:14px;">모르는 문제 <span class="badge" id="wrongCount">0</span></div>
        <button style="width:auto; padding:4px 12px; font-size:12px;" class="ghost" id="clearWrongBtn">전체 해제</button>
      </div>
      <div class="muted" style="margin-bottom:6px;">문제를 클릭하면 정답이 펼쳐집니다.</div>
      <div class="wrong-list" id="wrongList"></div>
    </div>

    <div style="margin-top:12px;">
      <div class="muted" style="margin-bottom:6px;">정답 표시 후 자동 다음(초)</div>
      <label style="margin-right:14px;">
        <input type="radio" name="autoNext" value="10" checked> 10초
      </label>
      <label style="margin-right:14px;">
        <input type="radio" name="autoNext" value="20"> 20초
      </label>
      <label>
        <input type="radio" name="autoNext" value="30"> 30초
      </label>
    </div>

  </div>

<script>
if ('serviceWorker' in navigator) {

    { q: '6.15 동력 운전 불능 시 조치',
      a: '1) 급전(AC/DC) 및 MCB 투입 확인\n2) 전·후진 핸들 위치 확인\n3) Door등 점등 확인(소등 시 후부 DILPN 차단 여부)\n4) 주차제동 스위치 + 주공기압력(6.0~7.0kg/㎠↑)\n5) ATC/ATS 차단기(ATCN, ATCPSN, ATSN1)\n6) 제동 완해에서 2~3초 동력 취급(ZVR 불량)\n7) 관제 승인 후 ATCCOS/ATSCOS 차단 후 동력 취급\n8) 불능 시 후부 운전실에서 취급' },

    { q: '6.17 비상제동 체결 관련 차단기/스위치',

      a: '1) 승강장 내 정차: 차장과 협의해 정지위치 조정, 관제에 즉시 보고\n2) 승강장 완전 이탈: 관제 퇴행 승인 후 차장과 협의해 퇴행' },
    { q: '6.29 ATS 구간 출발신호 정지 시 조치(하선 금정/상선 산본)',
      a: '1) 차장 안내방송 요청, 관제에 통보 후 운전명령 번호 수신\n2) 제동 4단 이상에서 ASOS 취급(수신호 시 확인), 선로전환기 확인하며 맨 바깥 전환기 통과까지 25km/h 이하\n3) 맨 바깥 전환기부터 다음 신호기까지 열차 없음 확인 시 45km/h 이하, 그 밖은 25km/h 이하' },
    { q: '6.30 장시간 단전 시 조치',
      a: '1) 관제에 단전/급전 시기 확인, 차장 안내방송 요청\n2) 구름방지 조치 + TC차 배전반 EOCN ON(EON/EORN 확인)\n3) Pan 하강 + 제동핸들 취거, 축전지 전압 수시 확인(74V 이상)\n4) 필요 시 각 차량 출입문 1개씩 개방해 편의 제공, 급전 시까지 대기' },
    { q: '6.31 ASOS(특수 스위치) 취급 시기',
      a: '1) 수신호/유도신호기에 따라 운전\n2) 입환신호기/구내폐색신호기 정지 구간을 넘어서 운전\n3) 정지신호 R0 자동폐색신호기 넘거나 넘어서 정지\n4) 지상장치 고장\n5) 입환표지(입환신호기 포함)와 입환신호기 개통 구간 운전' },
    { q: '6.32 진로 개통 표시기 불량 시 조치(상선 범계/인덕원/대공원)',
      a: '차내 신호가 진행이어도 진로개통표시기 지나 진입 불가 → 진행 수신호 생략 승인에 의해 운전' },
    { q: '6.33 직류 전환(AC→DC) 시 MCB 양 소등 조치',
      a: '1) 즉시 EPanDS, 절연구간 40km/h 이하 무동력 통과\n2) 최근역 정차, 모니터로 MCB 차단 불능 차량 확인 → EPanDS 복귀/ Pan 상승\n3) Pan 상승 불능 차의 MCBN1 차단이면 복귀\n4) 정상이면 MCB 기계적 고착 판단 → 완전부동 + 연장급전 후 운전' },
    { q: '6.34 교류 전환(DC→AC) 시 MCB 양 소등 조치',
      a: '1) 즉시 EPanDS\n2) 최근역 정차, 해당 차 완전부동 취급 후 연장급전하고 운전' },
    { q: '6.35 교류 모진 시 현상 및 조치',
      a: '현상: DCArr 방전으로 단전 → AC등 소등, 모니터 ‘AC 과전류(1차)’, MCB OFF/Fault/차측등(백색) 점등\n조치: 1) 즉시 EPanDS, 최근역 도착 후 EPanDS 복귀\n2) 해당 차 완전부동 + 연장급전\n3) MCBOS-RS(3초)-MCBCS로 Fault/차측등 소등 후 운전' },
    { q: '6.36 교·직류 전환 시 MCB ON등 계속 점등 시 조치',
      a: '1) 2선 단선 또는 HCR2(b) 접점 불량 등으로 MCB 차단 불능 가능\n2) 즉시 EPanDS, (직류전환) 절연구간 40km/h 이하 / (교류전환) 그대로 운전하여 최근역 도착\n3) EPanDS 복귀, Pan 상승/MCB 투입 후 전도 운전\n4) 종착역 도착 후 운전실 교환 뒤에는 후부 MCN 차단하고 전도 운전 후 입고' },
    { q: '6.37 EPanDS 고착/복귀 불능 시 조치',
      a: '전부 운전실 PanDN 차단, 관제 지시로 후부 운전실에서 추진 운전(1인 승무 열차는 구원받아 회송)' },
    { q: '6.38 EGCS 고착/복귀 불능 시 조치',
      a: '전부 운전실 PanDN 차단, 관제사가 지시하는 역까지 운전' },
    { q: '6.39 임시 신호기 종류',
      a: '서행 예고 신호기 / 서행 신호기 / 서행 해제 신호기' },
    { q: '6.40 임시 신호기 지나 동력 운전 시점',
      a: '1) ATC 구간: 전부 TC차가 서행 해제 신호기 지점 도달 시\n2) ATC 외: 후부 TC차가 서행 해제 신호기 지난 후 동력 운전' },
    { q: '6.41 임시 신호기(서행 예고) 설치 지점',
      a: '지상: 서행 신호기 전방 400m 이상 / 지하: 200m 이상' },
    { q: '6.42 비상 전호 요령',
      a: '주간: 양팔 높이 들거나 녹색기 이외 물건 급격히 휘두름 / 야간: 녹색등 이외 등을 급격히 휘두르거나 양팔 높이 듦' },
    { q: '6.43 DSD가 작동되지 않는 경우(DSD a접점)',
      a: '1) 정차(또는 5km/h 이하) 중 ZVR 여자\n2) 제동 취급으로 ELBR 여자\n3) DSSRR 여자\n4) 동력핸들(DSD)을 누르고 있을 때' },
    { q: '6.44 EBCOS 투입 중 DSD 작동 관련',
      a: '경고음은 계속 울리지만 비상제동은 체결되지 않음' },
    { q: '6.45 안산·과천선 선로 최고 속도',
      a: '안산·과천선 선로 최고 110km/h. 다만 과천선(금정~남태령)은 ADU 최고 80모드 현시로 80km/h 이하' },
    { q: '6.46 지하 구간 운전 중 화재 발생 시 조치',
      a: '1) 관제에 급보 + 119/관계처 출동 요청, 차장 안내방송 및 승객 분산 통보\n2) 최근역까지 운전해 여객 대피 후 119/직원과 소화 조치' },
    { q: '6.47 출입문 고장에 따른 열차 회송',
      a: '마지막 열차 외에는 관제 지시로 회송(지하 승강장 통과속도: 서울교통공사 45km/h 이하, 코레일 구간 60km/h 이하)' },
    { q: '6.48 전체 출입문이 열리지 않는 경우',
      a: '1) 전부 TC차 CrSN 확인\n2) ATCN/ATCPSN/BVN1 차단 여부 확인(ZVR 무여자)\n3) 전부 TC차에서 DOS 취급\n4) 관제 보고 후 후부 운전실 LSBS ON 후 DOS' },
    { q: '6.49 출입문 양 소등 현상',
      a: '출입문(DOOR)등과 출입문 차측등이 모두 소등된 상태' },
    { q: '6.50 DILPN 차단 후 복귀 불능 시 현상과 조치',
      a: '현상: DOOR등 + 계기등 소등\n조치: 1) 전부 운전실 DILPN 복귀 불능: 동력운전 가능 → 관제 지시에 따라 주의운전\n2) 후부 운전실 DILPN 복귀 불능/DS 접점 불량: 동력운전 불능 → 관제 승인 후 DIRS(비연동) 투입, 지시 역까지 주의운전(모니터로 출입문 닫힘 확인)' },
    { q: '6.51 1개 출입문이 닫히지 않을 때 조치',
      a: '1) 해당 DMV 및 공기관 Cock 이물질 확인\n2) 관제 보고 후 안내원 승차 + DIRS 승인, 승객 분산\n3) 출입문 수동잠금 + 안내문 부착 후 차량교체역까지 운전\n4) 수동잠금 불능이면 회송(마지막 열차는 감시자 승차 등 조건부 운전)' },
    { q: '6.52 1개 출입문이 열리지 않을 때 조치',
      a: '1) 해당 DMV 및 공기관 Cock 확인\n2) 관제 보고 및 승객 분산\n3) 출입문 수동잠금 + 안내문 부착 후 차량교체역까지 운전\n※ 편성 중 2개 이상 출입문 고장 시 회송' },
    { q: '6.53 전체 출입문이 닫히지 않을 때 조치',
      a: '1) DOS를 수회 취급\n2) CrSN OFF 후 ON 취급' },
    { q: '6.54 BVN1·BVN2 차단 또는 HCRN 차단 시 조치',
      a: 'EBCOS 취급해도 비상제동 완해 불능 → 관제 지시로 추진 운전' },
    { q: '6.55 ATC 차상 장치 고장 시 현상 및 조치',
      a: '현상: ADU ‘STOP’ 현시 + 경고음 + 비상제동 체결(제동 1~7단에서 경고음 정지)\n조치: 관제 보고 후 지시 받아 ATCCOS 차단, 지령운전(45km/h 이하)' },
    { q: '6.56 ATC 차단(ATCCOS 차단)하는 경우와 운전 방법',
      a: '경우: ① ATC 차상장치 고장 ② ATCN/ATCPSN 차단 후 복귀불능 ③ 구원운전 ④ 대용폐색 시행(관제 승인 후 취급)\n방법: ADU 15모드 + 8초 알람, 관제 지정 정거장까지 지령운전(45km/h 이하)' },
    { q: '6.57 ATC 구간 지시속도 초과 시 운전 취급',
      a: '1) 경고음 + ADU 지령속도 Flash, ATC에 의한 상용 7step 제동 체결\n2) 제동 1~7step로 확인제동하면 경고음 정지(지령속도 이하 될 때까지 Flash 지속), 동력 중이면 동력 OFF\n3) 지시속도 이하 되면 제동 완해' },
    { q: '6.58 ADU에 정지(Stop) 신호 현시될 수 있는 경우와 조치',
      a: '1) 선행열차 접근 또는 지상장치 고장 등으로 무신호이면 Stop 현시 → 자동정차 후 15모드 현시\n2) 신호 기다리거나 관제 승인 후 확인운전(15km/h 이하)' },
    { q: '6.59 VZ 고장(작동 불능) 시 현상',
      a: '1) ATC 0모드로 정차해도 ADU에 15모드가 현시되지 않음\n2) 원인 예: BVN1/ATCN/ATCPSN 차단, 속도발전기 고장 등' },
    { q: '6.60 ATC 구간 대용 폐색 방식 시행 종류',
      a: '복선: 지령식/통신식  |  단선: 지령식/지도통신식' },
    { q: '6.61 ATS 구간에서 폐색신호기 정지신호일 경우 운전',
      a: '1) 신호기 바깥쪽에 일단 정차 후 정지신호 구간 15km/h 이하 운전\n2) 관제 승인 있으면 ASOS 취급 후 45km/h(최초열차 25km/h) 이하' },
    { q: '6.62 ATS 구간에서 15km/h 스위치 취급하는 경우',
      a: '1) 정지신호(R1) 자동폐색신호기 넘어서 운전하거나 넘어서 정지한 경우\n2) 폐색신호기 소등 구간 운전 시' },
    { q: '6.63 ATSCOS 차단 취급을 하는 경우',
      a: '1) 대용 폐색 시행 2) 구원 운전 3) ATS 차상장치 고장 4) ATS에 의한 비상제동 완해 불능' },
    { q: '6.64 교-교 절연 구간 정차 시 현상 및 조치',
      a: '1) 절연구간 근접 정차: (현상) MCB ON/AC/SIV 점등 (조치) 관제 퇴행 승인 후 25km/h 이하 인출지점까지 후진 → 재통과\n2) 전부 Pan 정차: (현상) MCB 양소등, AC/SIV 점등 (조치) 25km/h 이하 퇴행 → MCBOS-MCBCS 후 통과\n3) 중간 Pan 정차: (현상) MCB 양소등, AC/SIV 점등 (조치) 후부 M\'차 ADAN/ADDN/PanVN 차단해 후부 Pan 내림 → 통과 후 최근역에서 복귀\n4) 후부 Pan 정차: (현상) MCB 양소등, AC/SIV 점등 (조치) 그대로 동력 취급 인출 → 통과 후 MCBOS-MCBCS' },
    { q: '6.65 교-직 절연 구간 정차 시 조치',
      a: '1) 전부 Pan 정차(또는 근접): (현상) MCB OFF등, AC 또는 DC 점등, SIV 소등\n   (조치) 관제 퇴행 승인 → ADS를 절환 전 위치로 되돌려 MCB 투입 → 15km/h 이하 인출지점까지 퇴행 후 통과\n2) 중간/후부 Pan 정차: (현상) MCB 양소등, AC/DC 점등, SIV 점등 → 그대로 동력 취급 통과\n3) 후부 Pan 정차: (현상) MCB 양소등, AC 또는 DC 점등, SIV 점등 → 그대로 동력 취급 통과' },
    { q: '6.66 과천선 VVVF 전동차 PanPS 압력',
      a: '4.2~4.4kg/㎠ (Pan 상승 작용)' },
    { q: '6.67 BCN과 VN 차단 시 현상',
      a: '1) BCN: 편성 모두 차단 시 축전지 충전 불능\n2) VN: 103선 가압되었으나 축전지 전압계 현시 불능' },
    { q: '6.68 ATC 차상 장치 구성 요소',
      a: 'Pick Up Coil / 속도발전기 / ATC Rack / ADU' },
    { q: '6.69 열차 화재로 정거장 외에서 승객 대피 시 조치',
      a: '1) 관제사에게 상황 보고\n2) 교량/터널 내면 바깥까지 운전, 지하구간은 최근역 또는 지상으로 운전\n3) 정차 후 소화 + 여객 대피 유도 또는 화재 차량 격리' },
    { q: '6.70 ATS 알람 벨이 계속 작동 시',
      a: '1) ATSCOS 취급 후 비상제동 완해되나 Alarm Bell 계속이면 ATS함 내 ATSN2 차단\n2) Alarm Bell 계속 + 비상제동 작동이면 ATS함 내 ATSN1 확인 후 복귀' },
    { q: '6.71 전차선 장애로 Pan 파손 시 현상 및 조치',
      a: '현상: 해당 차량 MCB 차단으로 MCB 양소등, SIV 점등, POWER등 점등 불능\n조치: 1) 관제에 직원 출동 요청, 파손 Pan 결박\n2) 해당 차량 완전부동(ADAN/ADDN 차단, PanVN+Pan 공기관 Cock 차단) 후 연장급전(IVCN 차단, ESS 1 또는 2)' },
    { q: '6.72 편성 중 5개 차량 제동 불능 시 조치',
      a: '제동축 비율에 따라 제한속도 운전(예: 60% 미만~40% 이상이면 70km/h 이하, 40% 미만이면 최근 정거장까지 25km/h 이하 운행 후 조치)' },
    { q: '6.73 축전지 전압이 낮을 경우 ACM 구동 방법',
      a: '1) M\'차 1칸만 선택 ACM 구동(나머지 차량 ACMN/ACMKN 차단 후 ACMCS)\n2) ACM 구동된 1개 차량 Pan 상승 + MCB 투입 → SIV/CM 구동으로 충기된 MR압력으로 나머지 차량 기동\n※ ACM 표시등 무점등이면 운전실 HCRN 차단 여부 확인' },
    { q: '6.74 대용 폐색 방식이란',
      a: '폐색장치 고장 등으로 상용 폐색 불가 시 대용으로 사용하는 방식.\n도시철도운전규칙: 복선(지령식/통신식), 단선(지도통신식)\n철도차량운전규칙: 통신식/지도통신식/지도식/지령식' },
    { q: '6.75 기관사가 운전실 이석 시 조치',
      a: '1) 역장 또는 관제사에게 사유 보고\n2) 주차제동 체결 + 구름방지 조치, MC키 휴대, 운전실 문 쇄정' },
    { q: '6.76 사고 시 열차 방호의 종류와 방법',
      a: '종류(코레일 구간): ① 열차무선 방호장치 ② 무선전화기 ③ 열차표지 ④ 정지수신호 ⑤ 방호스위치 ⑥ 역구내 신호기 일괄제어 방어\n방법: 지장선로 앞·뒤 양쪽 방호가 원칙(단, 진행하지 않음이 확실한 방향 등 조건 시 일부 생략 가능)' },
    { q: '6.77 임시신호기 설치 위치',
      a: '1) 서행 예고: 서행 신호기 이전 200m(지상 400m) 이상\n2) 서행 신호기: 지장개소 50m 이전\n3) 서행 해제: 지장개소로부터 (50m + 편성길이) 이상(지상은 지장개소 50m 지난 지점)' },
    { q: '6.78 전부운전실 ATCN 트립 발생 시 현상',
      a: '1) 비상제동 작동\n2) ADU 무현시(소등)\n3) 동력 운전 불능\n4) 정차 후 출입문 열림 불능(ZVR 무여자)\n5) 정차 중 DSD 누르지 않고 제동 완해하면 운전자 경계장치 작동(ZVR 무여자)' },
    { q: '6.79 DSD 작동하지 않는 경우',
      a: '1) 정차 또는 5km/h 이하로 운행해 ZVR 여자\n2) 제동 취급으로 ELBR 여자\n3) DSSRR 여자\n4) DSD를 누르고 있는 경우' },
    { q: '6.80 BVN1,2 차단 시 현상',
      a: '1) 비상제동 체결\n2) 출입문 취급 불능(ZVR 무여자)\n3) ATS/ATC 작동 불능\n4) 동력 운전 불능' },
    { q: '6.81 DOS의 DCS(출입문 닫힘 스위치) 접점 불량 시 조치',
      a: '1) 접점 불량 방향 출입문 연 후 DCS 취급해도 닫히지 않으면 CrSN OFF 후 ON\n2) 운행 중 해당 방향 승강장일 때: DOS로 개방 후 CrSN OFF→ON으로 전체 닫힘\n3) 관제 보고 후 지시 역까지 운행, 회송 조치' },
    { q: '6.82 각종 표지(그림 파트는 텍스트로 정리)',
      a: '1) 교-직 절연 구간 표지: 교-직 절연 구간 시작 지점 설치, 설치 구간 동력 운전 금지\n2) 타행 표지: 교류/직류 절연 150~200m 전, 교류/교류 절연 100~200m 전 설치. 타행표지~역행표지까지 무동력 운전\n3) 절연 구간 예고 표지: 가선 절연 구간 표지 예고용(약 400m 전)\n4) 교-교 절연 구간 표지: 교-교 절연 구간 시작 지점, 설치 구간 동력 운전 금지\n5) 전기동차용 역행 표지: 전차선 절연 구간 지난 지점, 해당 지점부터 동력 운전 가능\n6) 열차 정지 표지: 정거장/구내 운전 차량 상시 정차 지점 표시(설치 지점 전방에 정차)\n7) 차량 정지 표지: 구내운전/입환 차량 정지 또는 운전구간 끝 지점 표시(설치 지점 전방에 정차)\n8) 차량 접촉 한계 표지: 선로 분기/교차 지점에서 인접 선로 차량 지장하지 않는 한계 표시(표지 내에 차량 유지)\n9) 차막이 표지: 본선/주요 착선 끝 지점 차막이 설치, 차량은 이 지점 넘지 못함\n10) 전차선 구분 표지: 급전 구분 장치 시작 지점, 운전 중 불가피 정차 시 Pan이 구분장치에 걸리지 않게 주의\n11) 가선 중단 표지: 전차선 끝 지점 표시 필요 지점, 전동차는 표지 넘어 진행 불가\n12) 장내 경계 표지: ATC 시행 구간 정거장 진입 열차에 대해 장내 진로 경계 표시\n13) 출발 경계 표지: ATC 시행 구간 정거장 진출 열차에 대해 출발 진로 경계 표시\n14) 폐색 경계표지: ATC 시행 구간에서 궤도회로 경계 지점에 순차 설치\n15) 폐색신호기 식별 표지: 자동폐색신호기 식별 위해 도착역 장내신호기 다음 폐색신호기부터 순차 번호 부여\n16) 전차선로 작업 표지: 전기직원이 역 구내·외 본선 작업 시 작업지점 표시(약 200m 전방). 확인 시 주의기적 올려 열차 접근 알림' }
  ];

  // ⚠️ 위 bank는 “6.1~6.82” 텍스트 기반으로 정리한 기본 세트야.
  // 네가 말한 82문항 전체(6.1~6.82) 중 “중간 세부 항목이 더 많거나” PDF에 추가 문항이 더 있었다면
  // 그 부분은 원본 형식 그대로 여기 bank에 추가해주면 됨.

  let deck = [];
  let deckPos = 0;
  let history = []; // 방문한 문제 인덱스 기록
  let historyPos = -1; // 현재 history 내 위치

  let currentIndex = 0;
  let remaining = TOTAL;
  let timerId = null;
  let showAnswer = false;

  // 모르는 문제 (localStorage 저장)
  const STORAGE_KEY = 'quiz_wrong_set';
  let wrongSet = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
  function saveWrongSet() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...wrongSet]));
  }

  let wrongListVisible = false;
  let autoNextTimeoutId = null;

  function clearAutoNext() {
    if (autoNextTimeoutId) {
      clearTimeout(autoNextTimeoutId);
      autoNextTimeoutId = null;
    }
  }

  function getAutoNextDelaySeconds() {
    const checked = document.querySelector('input[name="autoNext"]:checked');
    const v = checked ? parseInt(checked.value, 10) : 10;
    return Number.isFinite(v) ? v : 10;
  }

  const $ = (id) => document.getElementById(id);

  function resetDeck(shuffle=true) {
    deck = [...Array(bank.length).keys()];
    if (shuffle) deck.sort(() => Math.random() - 0.5);
    deckPos = 0;
  }

  function stopTimer() {
    if (timerId) {
      clearInterval(timerId);
      timerId = null;
    }
  }

  function startTimer() {
    stopTimer();
    showAnswer = false;
    remaining = TOTAL;
    timerId = setInterval(() => {
      remaining -= 1;
      if (remaining <= 0) {
        remaining = 0;
        showAnswer = true;
        stopTimer();
        render();

        // ✅ 정답 표시 후 N초 뒤 자동 다음
        clearAutoNext();
        const delaySec = getAutoNextDelaySeconds();
        autoNextTimeoutId = setTimeout(() => {
        drawNext(); // 다음 문제로 자동 이동 + 타이머 60초 재시작
      }, delaySec * 1000);

  return; // 여기서 끝 (아래 render() 중복 방지)
}
render();
    }, 1000);
    render();
  }

  function drawNext() {
    if (!bank.length) return;

    // ✅ 타이머 남아도 다음 가능: 다음 눌렀을 때 타이머 즉시 리셋
    // (그래서 여기서 stopTimer() 먼저)
    stopTimer();
    clearAutoNext(); // ✅ 자동 다음 예약 취소

    if (deckPos >= deck.length) resetDeck(true); // 한 바퀴 끝나면 다시 섞기
    currentIndex = deck[deckPos++];

    // history에서 중간에 있었다면 이후 기록 잘라내고 새로 추가
    history = history.slice(0, historyPos + 1);
    history.push(currentIndex);
    historyPos = history.length - 1;

    showAnswer = false;
    remaining = TOTAL;
    render();
    startTimer();
  }

  function drawPrev() {
    if (historyPos <= 0) return;
    stopTimer();
    clearAutoNext();

    historyPos--;
    currentIndex = history[historyPos];
    showAnswer = false;
    remaining = TOTAL;
    render();
    startTimer();
  }

  function restartTimerOnly() {
    clearAutoNext(); // ✅ 자동 다음 예약 취소
    startTimer();
  }

  function toggleAnswer() {
    showAnswer = !showAnswer;
    render();
  }

  function toggleWrong() {
    if (wrongSet.has(currentIndex)) {
      wrongSet.delete(currentIndex);
    } else {
      wrongSet.add(currentIndex);
    }
    saveWrongSet();
    render();
    if (wrongListVisible) renderWrongList();
  }

  function toggleWrongList() {
    wrongListVisible = !wrongListVisible;
    render();
    renderWrongList();
  }

  function clearWrongList() {
    wrongSet.clear();
    saveWrongSet();
    render();
    renderWrongList();
  }

  function renderWrongList() {
    const panel = $("wrongListPanel");
    const list = $("wrongList");
    const countEl = $("wrongCount");
    const btn = $("showWrongListBtn");

    countEl.textContent = wrongSet.size;
    btn.textContent = wrongListVisible ? "목록 닫기" : `모르는 문제 목록 (${wrongSet.size})`;
    panel.style.display = wrongListVisible ? "block" : "none";

    if (!wrongListVisible) return;

    const sorted = [...wrongSet].sort((a, b) => {
      const qa = bank[a] ? bank[a].q : '';
      const qb = bank[b] ? bank[b].q : '';
      return qa.localeCompare(qb, 'ko');
    });

    list.innerHTML = '';
    if (sorted.length === 0) {
      list.innerHTML = '<div class="muted" style="padding:12px;">체크한 문제가 없습니다.</div>';
      return;
    }
    sorted.forEach(idx => {
      const item = bank[idx];
      if (!item) return;
      const div = document.createElement('div');
      div.className = 'wrong-item';
      div.innerHTML = '<div class="wrong-q"></div><div class="wrong-a"></div>';
      div.querySelector('.wrong-q').textContent = item.q;
      div.querySelector('.wrong-a').textContent = item.a;
      div.addEventListener('click', () => div.classList.toggle('open'));
      list.appendChild(div);
    });
  }

  function render() {
    $("timer").textContent = remaining;
    $("bar").style.width = (remaining / TOTAL * 100) + "%";

    const item = bank[currentIndex] || { q: "문제가 없습니다.", a: "" };
    $("question").textContent = item.q;

    $("answerBox").style.display = showAnswer ? "block" : "none";
    $("answerToggleLabel").textContent = showAnswer ? "숨기기" : "보기";
    $("answer").textContent = item.a;

    const total = bank.length;
    const solved = Math.min(deckPos, total);
    const left = total - solved;
    $("cycleInfo").textContent = total
      ? `이번 바퀴 남은 문제: ${left} / ${total}`
      : "";

    $("prevBtn").disabled = historyPos <= 0;

    const markBtn = $("markWrongBtn");
    const isMarked = wrongSet.has(currentIndex);
    markBtn.textContent = isMarked ? "체크 해제" : "모르는 문제";
    markBtn.className = isMarked ? "danger active" : "danger";

    // 목록 버튼의 개수 표시만 갱신 (목록 자체는 다시 그리지 않음)
    $("showWrongListBtn").textContent = wrongListVisible ? "목록 닫기" : `모르는 문제 목록 (${wrongSet.size})`;
    $("wrongCount").textContent = wrongSet.size;
  }

  $("prevBtn").addEventListener("click", drawPrev);
  $("nextBtn").addEventListener("click", drawNext);
  $("restartBtn").addEventListener("click", restartTimerOnly);
  $("showAnswerBtn").addEventListener("click", toggleAnswer);
  $("markWrongBtn").addEventListener("click", toggleWrong);
  $("showWrongListBtn").addEventListener("click", toggleWrongList);
  $("clearWrongBtn").addEventListener("click", clearWrongList);

  // 초기 시작
  resetDeck(true);
  drawNext();
})();
</script>
</body>
</html>
